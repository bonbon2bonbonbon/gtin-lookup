<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTIN 조회 도구</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :root {
    --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:#2e2e2e;
    --text:#e8e8e8;--text2:#888;--text3:#555;
    --accent:#00d4aa;--accent2:#00a882;--danger:#ff4444;--warning:#ffaa00;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh}
  .header{border-bottom:1px solid var(--border);padding:20px 24px}
  .header-logo{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--accent)}
  .header-sub{font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:3px}
  .main{max-width:900px;margin:0 auto;padding:32px 24px}

  .brand-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
  .tab{height:36px;padding:0 16px;border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text2);font-family:'IBM Plex Mono',monospace;font-weight:600;transition:all 0.15s;display:flex;align-items:center;gap:7px}
  .tab:hover{border-color:#444;color:var(--text)}
  .tab.active-adidas{background:#001a15;border-color:var(--accent);color:var(--accent)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .dot-adidas{background:var(--accent)}

  /* STEP 박스 */
  .steps{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
  .step{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
  .step-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent);font-weight:600;letter-spacing:1px;margin-bottom:8px}
  .step-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px}

  .input-row{display:flex;gap:8px}
  .input-row input{flex:1;height:42px;padding:0 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;letter-spacing:1px;outline:none;transition:border-color 0.15s}
  .input-row input:focus{border-color:var(--accent)}
  .input-row input::placeholder{color:var(--text3);font-weight:400;letter-spacing:0}

  .btn{height:42px;padding:0 18px;border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600;transition:all 0.15s;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
  .btn-primary:hover{background:var(--accent2)}
  .btn-ghost{background:transparent;color:var(--text3)}
  .btn-ghost:hover{color:var(--text);border-color:#444}
  .btn-sm{height:30px;padding:0 12px;font-size:11px}
  .btn-paste{height:42px;padding:0 18px;border:1px solid #444;border-radius:6px;font-size:13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600;background:#1a2a20;color:var(--accent);transition:all 0.15s}
  .btn-paste:hover{background:#002a1a}

  .url-display{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);margin-top:10px;word-break:break-all;display:none}

  .hint{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6;font-family:'IBM Plex Mono',monospace}
  .hint b{color:var(--text2)}

  textarea{width:100%;height:120px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:12px;outline:none;resize:vertical;transition:border-color 0.15s;margin-bottom:10px}
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:var(--text3)}

  .status{font-size:12px;font-family:'IBM Plex Mono',monospace;min-height:18px;margin-bottom:12px}
  .status.error{color:var(--danger)}.status.ok{color:var(--accent)}

  .result-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;animation:fadeIn 0.2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .card-header{padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .card-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .product-name{font-size:13px;font-weight:700;color:var(--text)}
  .badge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-weight:600;border:1px solid}
  .badge-adidas{background:#001a15;border-color:var(--accent);color:var(--accent)}
  .badge-count{background:#001a15;border-color:var(--accent);color:var(--accent)}
  .card-btns{display:flex;gap:6px}
  table{width:100%;border-collapse:collapse}
  th{padding:8px 16px;text-align:left;color:var(--text3);font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--bg3);font-weight:600}
  td{padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,0.02)}
  .size-cell{color:var(--text2);font-weight:500}
  .gtin-cell{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);letter-spacing:0.5px}
  .copy-btn{height:24px;padding:0 8px;font-size:10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--text3);font-family:'IBM Plex Mono',monospace;transition:all 0.15s}
  .copy-btn:hover{color:var(--text);border-color:#444}
  .copy-btn.copied{color:var(--accent);border-color:var(--accent)}
  .empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:12px;border:1px dashed var(--border);border-radius:10px;line-height:2}
  .empty-state .big{font-size:26px;margin-bottom:10px;display:block}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">GTIN LOOKUP</div>
    <div class="header-sub">아디다스 사이즈별 GTIN(EAN) 조회 — 쿠팡 등록용</div>
  </div>
</div>

<div class="main">

  <!-- STEP 1 -->
  <div class="steps">
    <div class="step">
      <div class="step-num">STEP 1</div>
      <div class="step-title">품번 입력 후 API 열기</div>
      <div class="input-row">
        <input type="text" id="codeInput" placeholder="KC9165" />
        <button class="btn btn-primary" onclick="openAPI()">🔗 API 열기</button>
      </div>
      <div class="url-display" id="urlDisplay"></div>
      <div class="hint">버튼 클릭 시 <b>새 탭</b>에서 아디다스 API가 열려요</div>
    </div>

    <!-- STEP 2 -->
    <div class="step">
      <div class="step-num">STEP 2</div>
      <div class="step-title">열린 페이지 전체 복사 후 여기에 붙여넣기</div>
      <textarea id="jsonInput" placeholder='새 탭에서 Ctrl+A → Ctrl+C 후 여기에 Ctrl+V'></textarea>
      <div class="input-row">
        <button class="btn btn-paste" onclick="parseAndRender()" style="width:100%">✨ GTIN 추출하기</button>
      </div>
      <div class="hint">새 탭 전체 내용을 복사해서 붙여넣으면 자동으로 표를 만들어줘요</div>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div id="results">
    <div class="empty-state">
      <span class="big">📦</span>
      STEP 1 → STEP 2 순서로 진행하면<br>
      사이즈별 GTIN 표가 여기에 나와요
    </div>
  </div>

</div>

<script>
const allData = {};

function openAPI() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (!code) { alert('품번을 입력해주세요'); return; }
  const url = `https://www.adidas.co.kr/api/products/${code}`;
  document.getElementById('urlDisplay').style.display = 'block';
  document.getElementById('urlDisplay').textContent = url;
  window.open(url, '_blank');
  setStatus('✓ 새 탭에서 API 열렸어요 — 전체 복사 후 STEP 2에 붙여넣기', 'ok');
}

function parseAndRender() {
  const raw = document.getElementById('jsonInput').value.trim();
  if (!raw) { setStatus('✗ 데이터를 붙여넣어주세요', 'error'); return; }

  try {
    const data = JSON.parse(raw);
    const code = data.id || document.getElementById('codeInput').value.trim().toUpperCase();
    const name = data.name || code;
    const skus = (data.variation_list || []).map(s => ({
      size: s.size, gtin: s.gtin, sku: s.sku
    }));
    if (!skus.length) throw new Error('variation_list 없음');

    document.querySelector('.empty-state')?.remove();
    renderResult(code, name, skus);
    document.getElementById('jsonInput').value = '';
    setStatus('✓ ' + code + ' — ' + skus.length + '개 사이즈 완료', 'ok');
  } catch(e) {
    setStatus('✗ 데이터 형식 오류 — 새 탭 전체(Ctrl+A)를 복사했는지 확인해주세요', 'error');
  }
}

function renderResult(code, name, skus) {
  const container = document.getElementById('results');
  document.getElementById(`card-${code}`)?.remove();

  const rows = skus.map(s => `
    <tr>
      <td class="size-cell" style="width:100px">${s.size}</td>
      <td class="gtin-cell">${s.gtin || '-'}</td>
      <td style="width:70px;text-align:right">
        <button class="copy-btn" onclick="copySingle(this,'${s.gtin}')">복사</button>
      </td>
    </tr>`).join('');

  const card = document.createElement('div');
  card.className = 'result-card';
  card.id = `card-${code}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="card-header-left">
        <span class="product-name">${name}</span>
        <span class="badge badge-adidas">ADIDAS</span>
        <span class="badge badge-count">${skus.length} SIZES</span>
      </div>
      <div class="card-btns">
        <button class="btn btn-ghost btn-sm" onclick="copyAll('${code}')">전체복사</button>
        <button class="btn btn-ghost btn-sm" onclick="copyCSV('${code}')">CSV</button>
      </div>
    </div>
    <table>
      <thead><tr>
        <th style="width:100px">사이즈</th>
        <th>GTIN (EAN)</th>
        <th style="width:70px"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  container.prepend(card);
  allData[code] = { name, skus };
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function copySingle(btn, gtin) {
  if (!gtin || gtin === '-') return;
  navigator.clipboard.writeText(gtin).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyAll(code) {
  const d = allData[code]; if (!d) return;
  navigator.clipboard.writeText(d.skus.map(s => `${s.size}\t${s.gtin}`).join('\n'));
  setStatus('✓ 클립보드에 복사됨 (탭 구분)', 'ok');
}

function copyCSV(code) {
  const d = allData[code]; if (!d) return;
  const rows = d.skus.map(s => `${code},ADIDAS,${d.name},${s.size},${s.gtin}`).join('\n');
  navigator.clipboard.writeText('품번,브랜드,상품명,사이즈,GTIN\n' + rows);
  setStatus('✓ CSV 형식으로 복사됨', 'ok');
}

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') openAPI();
});
</script>
</body>
</html>
